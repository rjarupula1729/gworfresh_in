# Pre-commit hooks for growfresh
# https://pre-commit.com
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
        exclude: '\.(md|html)$'
      - id: end-of-file-fixer
        exclude: '\.(md|html|png|jpg|jpeg|gif|ico|svg)$'
      - id: check-yaml
      - id: check-json
        exclude: 'tsconfig.*\.json$|.*\.code-workspace$'
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ['--maxkb=2048']
      - id: detect-private-key
      - id: mixed-line-ending
        args: ['--fix=lf']

  # Local hook: auto-rebuild shared/gf-db-bundle.js whenever any db/*.json
  # (or the build script itself) is staged, then re-stage the bundle.
  - repo: local
    hooks:
      - id: build-db-bundle
        name: build shared/gf-db-bundle.js from db/*.json
        language: system
        entry: bash -c 'node scripts/build-db-bundle.js && git add shared/gf-db-bundle.js'
        files: '^(db/.*\.json|scripts/build-db-bundle\.js)$'
        pass_filenames: false
