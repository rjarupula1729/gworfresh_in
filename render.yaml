# render.yaml – one-click deploy to Render.com
# Provisions a free Postgres instance + a web service for the API.
services:
  - type: web
    name: growfresh-api
    runtime: docker
    plan: free
    region: singapore
    rootDir: backend
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRE
        value: 30d
      - key: CORS_ORIGIN
        value: "*"
      - key: DATABASE_URL
        fromDatabase:
          name: growfresh-db
          property: connectionString

databases:
  - name: growfresh-db
    plan: free
    region: singapore
    postgresMajorVersion: 16
